<!DOCTYPE html>
<html>
<head>
  <title>Incharge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 class="text-center mb-4">Incharge Dashboard</h2>

  <!-- Available Stock -->
  <div class="card mb-4 shadow-sm">
    <div class="card-header bg-success text-white">
      Available Stock
    </div>
    <div class="card-body">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>Material</th>
            <th>Available Qty</th>
          </tr>
        </thead>
        <tbody id="stock"></tbody>
      </table>
    </div>
  </div>

  <!-- Request Material -->
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      Request Material
    </div>
    <div class="card-body">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Material</label>
          <select id="material" class="form-select">
            <option>cement_50kg</option>
            <option>cement_25kg</option>
            <option>msand</option>
            <option>jalli</option>
            <option>tmt_bar</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Quantity</label>
          <input id="qty" type="number" class="form-control" placeholder="Enter quantity">
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-primary w-100" onclick="requestMaterial()">
          Send Request
        </button>
      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>
<script>loadIncharge()</script>

</body>
</html>
