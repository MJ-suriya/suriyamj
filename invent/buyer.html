<!DOCTYPE html>
<html>
<head>
  <title>Buyer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 class="text-center mb-4">Gate Entry (Buyer)</h2>

  <!-- Entry Form -->
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      New Entry
    </div>

    <div class="card-body">

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Lorry Number</label>
          <input id="lorry" class="form-control" placeholder="Enter lorry number">
        </div>

        <div class="col-md-6">
          <label class="form-label">Date</label>
          <input id="date" type="date" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label">Material</label>
          <select id="material" class="form-select">
            <option>cement_50kg</option>
            <option>cement_25kg</option>
            <option>msand</option>
            <option>jalli</option>
            <option>tmt_bar</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Quantity</label>
          <input id="qty" type="number" class="form-control" placeholder="Enter quantity">
        </div>

        <div class="col-md-6">
          <label class="form-label">From Location</label>
          <input id="from" class="form-control" placeholder="From">
        </div>

        <div class="col-md-6">
          <label class="form-label">To Location</label>
          <input id="to" class="form-control" placeholder="To">
        </div>

      </div>

      <div class="mt-4">
        <button class="btn btn-success w-100" onclick="submitEntry()">
          Submit Entry
        </button>
      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
