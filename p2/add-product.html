<!DOCTYPE html>
<html>

<head>

<title>Add Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h3>Add Product Stock</h3>

<input id="name" class="form-control mb-2" placeholder="Product Name">

<select id="category" class="form-control mb-2">

<option>Boys</option>
<option>Girls</option>
<option>Mens</option>
<option>Womens</option>
<option>Kids</option>

</select>

<input id="sku" class="form-control mb-2" placeholder="Product SKU">

<input id="pieces" type="number" class="form-control mb-2" placeholder="Number of Pieces">

<input id="location" class="form-control mb-2" placeholder="Gudown Location">

<button class="btn btn-success" onclick="addProduct()">Add Product</button>

<script src="js/database.js"></script>
<script src="js/addProduct.js"></script>

</body>

</html>
