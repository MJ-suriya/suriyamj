<!DOCTYPE html>
<html>
<head>

<title>Credit Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center mb-4">Credit & Expense Dashboard</h2>

<!-- Balance -->

<div class="card p-3 mb-4">

<h4>
Balance: ₹<span id="balance">0</span>
</h4>

<h5 class="text-danger">
Over Expense: ₹<span id="overExpense">0</span>
</h5>

</div>

<!-- Add Credit -->

<div class="card p-3 mb-4">

<h5>Add Credit (Admin)</h5>

<input type="number" id="creditAmount" class="form-control mb-2" placeholder="Enter amount">

<button onclick="addCredit()" class="btn btn-success">Add Credit</button>

</div>

<!-- Expense -->

<div class="card p-3 mb-4">

<h5>Add Expense</h5>

<select id="category" class="form-select mb-2" onchange="checkOther()">

<option>Sales Expense</option>
<option>Canteen Expense</option>
<option>Stationary Expense</option>
<option>Electrical Expense</option>
<option>Building Expense</option>
<option>Other</option>

</select>

<input type="text" id="otherReason" class="form-control mb-2 d-none" placeholder="Enter reason">

<input type="number" id="expenseAmount" class="form-control mb-2" placeholder="Expense amount">

<button onclick="addExpense()" class="btn btn-danger">Add Expense</button>

</div>

<!-- Transaction -->

<div class="card p-3">

<h5>Transaction History</h5>

<ul id="transactions" class="list-group"></ul>

</div>

</div>

<script src="js/database.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
